name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Publishes the static export to the gh-pages branch, which the repo's Pages
# site already serves from ("Deploy from a branch"). No Pages source change
# required.
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_STATIC_EXPORT: "true"
      NEXT_PUBLIC_BASE_PATH: "/alradai"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # The /api/ai/chat route is a server handler and cannot exist in a static
      # export; the client answers in-browser (NEXT_PUBLIC_STATIC_EXPORT=true).
      - name: Remove server-only API routes for static export
        run: rm -rf app/api

      - name: Build static export
        run: npm run build

      - name: Add .nojekyll (preserve _next directory)
        run: touch out/.nojekyll

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
          force_orphan: true
