name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs on new pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_STATIC_EXPORT: "true"
      NEXT_PUBLIC_BASE_PATH: "/alradai"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # The /api/ai/chat route is a server handler and cannot exist in a static
      # export; the client answers in-browser (NEXT_PUBLIC_STATIC_EXPORT=true).
      - name: Remove server-only API routes for static export
        run: rm -rf app/api

      - name: Build static export
        run: npm run build

      - name: Add .nojekyll (preserve _next directory)
        run: touch out/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
