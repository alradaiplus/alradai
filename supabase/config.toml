# Supabase local/dev configuration for Notes Canvas.
# Run `supabase start` for a local stack, `supabase db push` to apply migrations,
# and `supabase functions deploy embed` to deploy the embedding function.

project_id = "notes-canvas"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_signup = true

[storage]
enabled = true
file_size_limit = "50MiB"

[edge_runtime]
enabled = true
